# Task configuration schema version
version = "2.0"

# Task metadata (author, difficulty, categorization)
[metadata]
author_name = "anonymous"
author_email = "anonymous"
difficulty = "hard"
category = "software-engineering"
subcategories = ["api_integration", "ui_building"]
number_of_milestones = 0
codebase_size = "small"
languages = ["rust"]
tags = ["event-handling", "gui-simulation", "state-machine", "hit-testing"]
expert_time_estimate_min = 180
junior_time_estimate_min = 360

# Verifier: runs the test script to check task completion
[verifier]
timeout_sec = 450.0

# Agent: limits how long the agent can run when attempting the task
[agent]
timeout_sec = 900.0

# Sandbox environment limits
[environment]
allow_internet = false
build_timeout_sec = 600.0
cpus = 2
memory_mb = 4096
storage_mb = 10240
